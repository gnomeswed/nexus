<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Nexus OS - AI Agent Orchestration System">
  <title>Nexus OS</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔮</text></svg>">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="#/" class="sidebar-logo" data-nav>
          <div class="logo-icon">🔮</div>
          <span class="logo-text">NEXUS OS</span>
        </a>
        <button class="sidebar-toggle" id="sidebar-collapse" title="Recolher menu">☰</button>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">Menu</div>
          <a href="#/" class="nav-item" data-nav data-page="dashboard">
            <span class="icon">📊</span> <span class="nav-label">Dashboard</span>
          </a>
          <a href="#/agents" class="nav-item" data-nav data-page="agents">
            <span class="icon">🤖</span> <span class="nav-label">Agentes</span>
            <span class="badge" id="agents-count">0</span>
          </a>
          <a href="#/projects" class="nav-item" data-nav data-page="projects">
            <span class="icon">📁</span> <span class="nav-label">Projetos</span>
            <span class="badge" id="projects-count">0</span>
          </a>
          <a href="#/tasks" class="nav-item" data-nav data-page="tasks">
            <span class="icon">✅</span> <span class="nav-label">Tarefas</span>
            <span class="badge" id="tasks-count">0</span>
          </a>
          <a href="#/reviews" class="nav-item" data-nav data-page="reviews">
            <span class="icon">📋</span> <span class="nav-label">Aprovações</span>
            <span class="badge" id="reviews-count" style="background:var(--accent-warning)">0</span>
          </a>
        </div>
        <div class="nav-section">
          <div class="nav-section-title">Sistema</div>
          <a href="#/settings" class="nav-item" data-nav data-page="settings">
            <span class="icon">⚙️</span> <span class="nav-label">Configurações</span>
          </a>
        </div>
      </nav>
      <div class="sidebar-footer">
        <button class="theme-toggle" id="theme-toggle" title="Alternar tema">🌙</button>
        <div class="version-text">Nexus OS v1.4.2</div>
      </div>
    </aside>

    <!-- Mobile overlay -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
      <div class="topbar" id="topbar">
        <button class="btn btn-icon mobile-menu" id="mobile-menu-btn">☰</button>
        <div class="topbar-search" id="topbar-search">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="Buscar... (Ctrl+K)" id="global-search-input" autocomplete="off">
        </div>
        <div class="topbar-actions">
          <button class="btn btn-icon" id="notif-btn" title="Notificações">🔔<span class="notif-dot" id="notif-dot" style="display:none"></span></button>
        </div>
      </div>
      <div id="page-container"></div>
    </main>
  </div>

  <!-- Search Modal -->
  <div class="search-overlay" id="search-overlay">
    <div class="search-modal">
      <div class="search-modal-input">
        <span>🔍</span>
        <input type="text" id="search-modal-input" placeholder="Buscar agentes, projetos, tarefas, mensagens..." autocomplete="off">
        <kbd>ESC</kbd>
      </div>
      <div class="search-results" id="search-results">
        <div class="search-empty">Digite para buscar...</div>
      </div>
    </div>
  </div>

  <!-- Modal Container -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal-content"></div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/api.js" defer></script>
  <script src="/js/socket.js" defer></script>
  <script src="/js/components/toast.js" defer></script>
  <script src="/js/components/modal.js" defer></script>
  <script src="/js/pages/dashboard.js" defer></script>
  <script src="/js/pages/agents.js" defer></script>
  <script src="/js/pages/agent-detail.js" defer></script>
  <script src="/js/pages/projects.js" defer></script>
  <script src="/js/pages/project-detail.js" defer></script>
  <script src="/js/pages/tasks.js" defer></script>
  <script src="/js/pages/task-detail.js" defer></script>
  <script src="/js/pages/reviews.js" defer></script>
  <script src="/js/pages/settings.js" defer></script>
  <script src="/js/app.js" defer></script>
</body>
</html>
