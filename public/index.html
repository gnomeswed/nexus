<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Nexus OS - AI Agent Orchestration System">
  <title>Nexus OS</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔮</text></svg>">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="#/" class="sidebar-logo" data-nav>
          <div class="logo-icon">🔮</div>
          <span class="logo-text">NEXUS OS</span>
        </a>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">Menu</div>
          <a href="#/" class="nav-item" data-nav data-page="dashboard">
            <span class="icon">📊</span> Dashboard
          </a>
          <a href="#/agents" class="nav-item" data-nav data-page="agents">
            <span class="icon">🤖</span> Agentes
            <span class="badge" id="agents-count">0</span>
          </a>
          <a href="#/projects" class="nav-item" data-nav data-page="projects">
            <span class="icon">📁</span> Projetos
            <span class="badge" id="projects-count">0</span>
          </a>
          <a href="#/tasks" class="nav-item" data-nav data-page="tasks">
            <span class="icon">✅</span> Tarefas
            <span class="badge" id="tasks-count">0</span>
          </a>
        </div>
        <div class="nav-section">
          <div class="nav-section-title">Sistema</div>
          <a href="#/settings" class="nav-item" data-nav data-page="settings">
            <span class="icon">⚙️</span> Configurações
          </a>
        </div>
      </nav>
      <div style="padding:16px 20px; border-top:1px solid var(--border);">
        <div style="font-size:11px; color:var(--text-muted);">Nexus OS v1.0</div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
      <div id="page-container"></div>
    </main>
  </div>

  <!-- Modal Container -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal-content"></div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/socket.js"></script>
  <script src="/js/components/toast.js"></script>
  <script src="/js/components/modal.js"></script>
  <script src="/js/pages/dashboard.js"></script>
  <script src="/js/pages/agents.js"></script>
  <script src="/js/pages/agent-detail.js"></script>
  <script src="/js/pages/projects.js"></script>
  <script src="/js/pages/project-detail.js"></script>
  <script src="/js/pages/tasks.js"></script>
  <script src="/js/pages/task-detail.js"></script>
  <script src="/js/pages/settings.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
